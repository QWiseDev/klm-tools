name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/qwisedev/klm-tools:latest
            ghcr.io/qwisedev/klm-tools:${{ github.sha }}

      - name: Build image tar
        run: |
          chmod +x scripts/docker-build.sh
          IMAGE_NAME=ghcr.io/qwisedev/klm-tools IMAGE_TAG=${{ github.sha }} OUTPUT_TAR=dist/klm-tools-docker.tar ./scripts/docker-build.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: klm-tools-docker-${{ github.sha }}
          path: dist/klm-tools-docker.tar
